<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta property="og:locale" content="en-us" />
        <meta name="theme-color" content="#4b3661">

        <script src="//unpkg.com/alpinejs" defer></script>
        <script src="https://unpkg.com/htmx.org@2.0.4"></script>
        <script type="module" src="/static/script/main.js"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="/static/style/layout.css">
        <link rel="stylesheet" href="/static/style/blog.css">
        <link rel="stylesheet" href="/static/style/background.css">
        <link rel="stylesheet" href="/static/style/random.css">
    </head>
    <body>
        <div id="score-layer" class="background">
            <p id="score-title"></p>
            <p id="score-counter"></p>
        </div>
        <div id="moon-layer" class="background">
            <img id="moon" draggable="false" src="/static/images/moon.png"></div>
        </div>
        <div id="treeline-layer">
            <div id="treeline-spacer"></div>
            <img id="treeline-image" src="/static/images/treeline.png">
        </div>
        <div id="fire-layer" class="background">
            <img src="/static/images/fire/fire1.png" draggable="false" id="fire-image">
            <div id="fire-button"></div>
        </div>
        <div id="object-layer" class="background"> 

        </div>
        <div id="firefly-layer" class="background">
        </div>
        
        <div id="content">
            <div id="spacer"></div>
            <img id="title" draggable="false" src="/static/images/logo.png">
            <div x-data="{selected: '{{ page_name }}'}" id="navbar">
                {{ navbar }}
            </div>
            <div id="page">
                {{ page }}
            </div>
        </div>
    </body>
</html>
